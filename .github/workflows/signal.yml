name: Crypto Signal Bot

on:
  schedule:
    # Her 6 saatte bir yeni workflow baslatilir
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: signal-bot
  cancel-in-progress: true

jobs:
  signal:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # Max 6 saat
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore signals history
        uses: actions/cache/restore@v4
        with:
          path: |
            signals_history.json
            performance.json
          key: signals-data-dummy
          restore-keys: |
            signals-data-

      - name: Run Signal Bot (continuous mode)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python main.py

      - name: Save signals history
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            signals_history.json
            performance.json
          key: signals-data-${{ github.run_id }}
